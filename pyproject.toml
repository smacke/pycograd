[build-system]
requires = [
    "setuptools >= 48",
    "wheel >= 0.30.0",
    "setuptools-git-versioning",
]
build-backend = 'setuptools.build_meta'

[tool.setuptools-git-versioning]
enabled = true

[tool.black]
line-length = 88
target-version = ['py310']
# Skip the auto-generated versioneer files (regenerated by versioneer, not hand-edited).
extend-exclude = '''
(
  versioneer\.py
  | _version\.py
)
'''

[tool.isort]
profile = 'black'
# Skip the auto-generated versioneer files (see ``[tool.black]`` above).
extend_skip = ['versioneer.py']
extend_skip_glob = ['*/_version.py']

[tool.ruff]
# The notebooks use the pipescript ambient DSL (the ``|>`` pipe surface), which
# is not valid Python, so ruff's notebook linting (on by default since 0.6)
# chokes on them. Lint the package sources only. The versioneer files are
# auto-generated (regenerated by versioneer, not hand-edited), so skip them too.
# ``test/autograd_suite`` is a faithful port of HIPS autograd's MIT-licensed test
# suite; it follows autograd's own style (assigned lambdas, ambiguous ``l`` names,
# even autograd's duplicate test defs) on purpose, so it is excluded like notebooks.
extend-exclude = [
    'notebooks',
    'versioneer.py',
    '_version.py',
    'test/autograd_suite',
]

[tool.pytest.ini_options]
filterwarnings = [
    'ignore::DeprecationWarning',
    'ignore::pytest.PytestAssertRewriteWarning',
]

[tool.coverage.run]
source = ['pycograd']
omit = ['pycograd/version.py']

[tool.coverage.report]
exclude_lines = [
    'pragma: no cover *$',
    '^ *if TYPE_CHECKING:',
    '^ *except Exception',
    '^ *raise',
    '^ *\.\.\.',
]
